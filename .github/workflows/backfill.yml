name: Backfill historico (desde 2020)

on:
  workflow_dispatch:
    inputs:
      start:
        description: "Data inicial (YYYY-MM-DD)"
        default: "2020-01-01"
      end:
        description: "Data final (YYYY-MM-DD, vazio = hoje)"
        default: ""

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    env:
      EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Backfill ajustes B3
        run: |
          END="${{ github.event.inputs.end }}"
          [ -z "$END" ] && END=$(date -u +%F)
          python scripts/fetch_b3.py "${{ github.event.inputs.start }}" "$END"

      - name: Backfill BCB + EIA + rebuild site
        run: |
          END="${{ github.event.inputs.end }}"
          [ -z "$END" ] && END=$(date -u +%F)
          python scripts/fetch_bcb.py
          python scripts/fetch_eia.py "${{ github.event.inputs.start }}" "$END"
          cd scripts && python build_site.py && python build_email.py

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data docs
          git diff --cached --quiet || git commit -m "Backfill historico"
          git push
